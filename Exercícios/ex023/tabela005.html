<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabela</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;

        }

        table{
            width: 500px;
            border-collapse: collapse;
        }
        caption{
            font-size: 1.3em;
            font-weight: bold;
            padding: 8px;
        }
        th,td{
            border: 1px solid black;
            padding: 8px;
        }
       
        col.cnome{
            background-color: aquamarine;
        }
        col.cgrupo{
            background-color: rgb(255, 221, 127);
        }
    </style>
</head>
<body>
    <h1>Exercício de Tabela</h1>

    <table>
        <colgroup>
            <col class="cnome">
            <col class="cgrupo" span="2"> 
            <col class="cprof">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Mário</td>
            <td>M</td>
            <td>30</td>
            <td>Cozinheiro</td>
        </tr>
        <tr>
            <td>Bruno</td>
            <td>M</td>
            <td>22</td>
            <td>Gerente</td>
        </tr>
        <tr>
            <td>Laura</td>
            <td>F</td>
            <td>35</td>
            <td>Professora</td>
        </tr>
        <tr>
            <td>Augusto</td>
            <td>M</td>
            <td>29</td>
            <td>Médico</td>
        </tr>
        <tr>
            <td>Fernanda</td>
            <td>F</td>
            <td>40</td>
            <td>Contadora</td>
        </tr>
    </table>
</body>
</html>
