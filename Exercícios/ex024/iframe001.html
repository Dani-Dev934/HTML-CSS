<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudo de iframe</title>
    <style>
        iframe{
            width: 300px;
            height: 300px;
            border: 1px dotted rgb(154, 6, 240);
            
        }
    </style>
</head>
<body>
    <h1>Estudando o uso de iframe</h1>
    <p>
        Acessando o site do
        <iframe src="https://cursoemvideo.com" frameborder="0" scolling="auto">
            <a href="https://cursoemvideo.com" target="_blank">Curso em Vídeo</a>
        </iframe>
        para aprender a programar
    </p>
    <p>
        O repositório do Guanabara 
        <iframe src="https://gustavoguanabara.github.io" frameborder="0">
            no <a href="https://gustavoguanabara.github.io" target="_blank">GitHub</a>
        </iframe> também é bem legal!
    </p>

</body>
</html>
